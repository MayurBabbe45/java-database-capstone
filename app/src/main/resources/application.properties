spring.application.name=back-end

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_clinic_db}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_clinic_docs}
management.endpoint.health.show-details=always
management.health.db.enabled=true


api.path=/
jwt.secret=${JWT_SECRET:$!@#$^%$$$%####$DDCPN0234FCFDPD8670M}



spring.web.resources.static-locations=classpath:/static/

# -------------------------
# Thymeleaf Configuration
# -------------------------
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false    
spring.thymeleaf.encoding=UTF-8
